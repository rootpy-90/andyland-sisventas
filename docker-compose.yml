services:
  # ============================================
  # APP - Laravel 5.4 con PHP 7.4 (Producción)
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: andyland-sisventas-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./storage:/var/www/storage
      - ./public/comprobantes:/var/www/public/comprobantes
      - ./public/imagenes:/var/www/public/imagenes
    networks:
      - dokploy-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: "Andyland PY - SisVentas"
      APP_ENV: production
      APP_KEY: "base64:IWxIqONRNhU5r3StQxY2XncUZd2tx/MUdMf0KEkLZ5g="
      APP_DEBUG: "false"
      APP_URL: "https://andyland-sisventas.ndeapp.com"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: dbventaslaravel
      DB_USERNAME: andyland_user
      DB_PASSWORD: A7SDY371Q
      CACHE_DRIVER: file
      SESSION_DRIVER: file
      QUEUE_DRIVER: sync
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - "dokploy.rebuild=true"
      - "com.andyland.commit=$(git rev-parse HEAD 2>/dev/null || echo 'unknown')"
      - traefik.http.routers.andyland-sisventas.rule=Host(`andyland-sisventas.ndeapp.com`)
      - traefik.http.routers.andyland-sisventas.entrypoints=websecure
      - traefik.http.routers.andyland-sisventas.tls.certresolver=letsencryptresolver
      - traefik.http.routers.andyland-sisventas.service=andyland-sisventas
      - traefik.http.services.andyland-sisventas.loadbalancer.server.port=80
      - traefik.http.services.andyland-sisventas.loadbalancer.passHostHeader=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ============================================
  # DATABASE - MySQL 5.7 (Producción)
  # ============================================
  db:
    image: mysql:5.7
    container_name: andyland-sisventas-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: dbventaslaravel
      MYSQL_USER: andyland_user
      MYSQL_PASSWORD: A7SDY371Q
      MYSQL_ROOT_PASSWORD: A7SDY371Q
    volumes:
      - andyland-db-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "mysql", "-uroot", "-pA7SDY371Q", "-e", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  dokploy-network:
    external: true

volumes:
  andyland-db-data:
    driver: local
